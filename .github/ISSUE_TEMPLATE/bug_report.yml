name: Bug report
description: Report a reproducible dirPathPerms problem
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not paste tokens, passwords,
        SSH keys, or private host details, and redact sensitive paths.

  - type: input
    id: version
    attributes:
      label: dirPathPerms version
      description: Provide a release tag or commit SHA.
      placeholder: v0.1.0 or 0123456
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Interactive prompts or input validation
        - Permission checking logic
        - Output formatting or colors
        - Input file handling
        - CI or release automation
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux (GNU coreutils)
        - macOS
        - Windows Subsystem for Linux (WSL)
        - BSD or other Unix
        - Not platform-specific
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the OS, Bash version (`bash --version`), and `stat --version` output. Redact private details.
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Observe ...
        3. Expected ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant redacted output
      description: Remove secrets and private infrastructure details before pasting.
      render: shell
