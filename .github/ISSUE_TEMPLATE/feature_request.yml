name: Feature request
description: Suggest a dirPathPerms improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What permission-auditing task is difficult today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior, prompts, or output.
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Note anything that would change the script from read-only reporting, affect how untrusted paths are handled, or alter output parsing.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe other approaches or workarounds you considered.
